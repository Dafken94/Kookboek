<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Kookboek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Lato',sans-serif;
  background:#1a0e08;
  background-image:radial-gradient(ellipse at 30% 70%,#2a1408 0%,transparent 60%),
                   radial-gradient(ellipse at 70% 20%,#0e1a0a 0%,transparent 55%);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:28px 80px;
}

/* ── TOC PANEL (buiten het boek) ── */
#tocPanel{
  position:fixed;left:20px;top:50%;transform:translateY(-50%);
  width:210px;max-height:75vh;
  background:linear-gradient(160deg,rgba(28,14,6,.97) 0%,rgba(38,20,10,.97) 100%);
  border:1px solid rgba(201,168,76,.35);
  border-radius:8px;padding:14px 12px 12px;
  z-index:40;display:flex;flex-direction:column;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.15);
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
}
#tocPanel.toc-hidden{
  transform:translateX(calc(-100% - 30px)) translateY(-50%);
  opacity:0;pointer-events:none;
}
#tocOpenBtn{
  position:fixed;left:0;top:50%;transform:translateY(-50%);
  z-index:41;width:28px;height:80px;
  border-radius:0 8px 8px 0;
  background:linear-gradient(160deg,rgba(28,14,6,.97),rgba(38,20,10,.97));
  border:1px solid rgba(201,168,76,.35);border-left:none;
  color:var(--gold);cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:3px 0 16px rgba(0,0,0,.6);
  transition:width .2s,background .2s;font-size:14px;
}
#tocOpenBtn:hover{width:34px;background:rgba(80,40,10,.97)}
.toc-close{
  background:none;border:none;color:rgba(201,168,76,.45);cursor:pointer;
  font-size:14px;padding:0;margin-left:auto;line-height:1;
  transition:color .15s;flex-shrink:0;
}
.toc-close:hover{color:var(--gold)}
#tocPanel::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  background:linear-gradient(180deg,rgba(201,168,76,.04) 0%,transparent 40%);
  pointer-events:none;
}
.toc-p-title{
  font-family:'Playfair Display',serif;font-size:12px;color:var(--gold);
  text-transform:uppercase;letter-spacing:.1em;
  padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,.25);
  display:flex;align-items:center;gap:6px;flex-shrink:0;width:100%;
}
.toc-p-search{
  padding:5px 9px;border:1px solid rgba(201,168,76,.2);border-radius:10px;
  background:rgba(255,255,255,.05);font-family:'Lato',sans-serif;
  font-size:11px;color:rgba(255,255,255,.7);outline:none;transition:border-color .2s;
  flex-shrink:0;
}
.toc-p-search::placeholder{color:rgba(255,255,255,.3)}
.toc-p-search:focus{border-color:rgba(201,168,76,.5)}
.toc-p-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.2) transparent;display:flex;flex-direction:column;gap:1px}
.toc-p-entry{
  display:flex;align-items:center;gap:6px;
  padding:6px 7px;border-radius:5px;cursor:pointer;
  transition:background .15s;
}
.toc-p-entry:hover{background:rgba(201,168,76,.1)}
.toc-p-entry.active{background:rgba(201,168,76,.15);border-left:2px solid var(--gold);padding-left:5px}
.toc-p-num{font-size:10px;color:var(--gold);font-weight:700;min-width:16px;flex-shrink:0}
.toc-p-name{font-family:'Playfair Display',serif;font-size:11px;color:rgba(240,220,190,.85);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.toc-p-entry.active .toc-p-name{color:var(--gold)}
.toc-p-empty{font-style:italic;font-size:11px;color:rgba(255,255,255,.3);padding:6px 0;text-align:center}

:root{
  --paper:#F5F0E8;--paper-dark:#E8E0D0;--paper-mid:#EDE5D5;
  --ink:#2C1810;--ink-light:#6B4A32;--ink-muted:#9C7B60;
  --accent:#8B4513;--gold:#C9A84C;--gold-light:#F0D080;
  --green:#4A7C59;--orange:#D35400;--red:#C0392B;
}

/* ── BOOK ── */
.book{
  position:relative;display:flex;
  width:min(100%,1160px);
  height:min(100%,800px);
  border-radius:3px 10px 10px 3px;
  box-shadow:
    0 2px 4px rgba(0,0,0,.3),
    0 8px 24px rgba(0,0,0,.5),
    0 24px 64px rgba(0,0,0,.6),
    0 0 0 1px rgba(0,0,0,.5);
}

/* ── PAGES ── */
.page-left,.page-right{
  flex:1;height:100%;overflow:hidden;position:relative;
}
.page-left{
  background:var(--paper-dark);
  border-right:1px solid rgba(0,0,0,.07);
  display:flex;flex-direction:column;
}
.page-right{
  background:var(--paper);
  display:flex;flex-direction:column;
}

/* ── SPINE ── */
.book-spine{
  width:40px;min-width:40px;height:100%;flex-shrink:0;
  background:linear-gradient(to right,#1e0f08 0%,#3D2B1F 18%,#6B4532 40%,#8B6040 50%,#6B4532 60%,#3D2B1F 82%,#1e0f08 100%);
  z-index:10;box-shadow:inset -5px 0 14px rgba(0,0,0,.5),inset 5px 0 14px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
}
.spine-text{
  writing-mode:vertical-rl;transform:rotate(180deg);
  color:var(--gold);font-family:'Playfair Display',serif;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.65;user-select:none;
}

/* ── NAV ARROWS ── */
.nav-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;z-index:20;
  border:2px solid var(--gold);background:rgba(30,15,8,.8);color:var(--gold);
  font-size:17px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;user-select:none;
}
.nav-arrow:hover{background:var(--accent);border-color:var(--gold-light);color:#fff}
.nav-arrow:disabled{opacity:.2;cursor:default;pointer-events:none}
.nav-arrow.prev{left:-58px}
.nav-arrow.next{right:-58px}

/* ── PAGE FLIP ── */
.flip-overlay{position:absolute;inset:0;pointer-events:none;z-index:30;perspective:2200px;overflow:hidden}
.flipper{position:absolute;top:0;right:0;width:50%;height:100%;transform-style:preserve-3d;transform-origin:left center}
.flipper.go-forward{animation:flipFwd .6s cubic-bezier(.4,0,.2,1) forwards}
.flipper.go-back   {animation:flipBck .6s cubic-bezier(.4,0,.2,1) forwards}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden}
.flip-back{transform:rotateY(180deg)}
@keyframes flipFwd{from{transform:rotateY(0)}   to{transform:rotateY(-180deg)}}
@keyframes flipBck{from{transform:rotateY(-180deg)} to{transform:rotateY(0)}}

/* page corner hint */
.corner-hint{
  position:absolute;bottom:0;right:0;width:0;height:0;
  border-style:solid;border-color:transparent;border-width:0;
  transition:border-width .25s;cursor:pointer;z-index:5;
}
.page-right:hover .corner-hint{
  border-width:0 0 40px 40px;
  border-bottom-color:rgba(201,168,76,.3);border-left-color:transparent;
}

/* ── COVER ── */
.cover-page{
  width:100%;height:100%;
  background:linear-gradient(150deg,#3a6b4a 0%,#2a4f37 55%,#1e3828 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;position:relative;
}
.cover-page::before{content:'';position:absolute;inset:14px;border:2px solid rgba(201,168,76,.35);pointer-events:none}
.cover-page::after {content:'';position:absolute;inset:19px;border:1px solid rgba(201,168,76,.18);pointer-events:none}
.cover-icon{font-size:54px;margin-bottom:20px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
.cover-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,52px);color:var(--gold);text-align:center;line-height:1.2;text-shadow:2px 3px 12px rgba(0,0,0,.5)}
.cover-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(13px,1.6vw,18px);color:rgba(201,168,76,.6);margin-top:6px;margin-bottom:28px}
.cover-rule{width:70px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:12px auto}
.cover-owner{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:2px;transition:all .2s}
.cover-owner:hover{color:var(--gold);border-bottom-color:var(--gold)}
.cover-back{width:100%;height:100%;background:var(--paper-dark);display:flex;align-items:center;justify-content:center}
.cover-back-decor{width:70%;height:70%;border:1px solid var(--gold);opacity:.12;border-radius:2px}


/* ── LEFT PAGE: RECIPE INFO ── */
.recipe-info{
  flex:1;overflow-y:auto;padding:14px 18px;
  scrollbar-width:thin;scrollbar-color:var(--paper-dark) transparent;
}
.rec-title-area{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--paper-dark)}
.recipe-title-inp{
  font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);
  border:none;background:transparent;outline:none;width:100%;
  border-bottom:1px dashed transparent;transition:border-color .2s;
}
.recipe-title-inp:hover,.recipe-title-inp:focus{border-bottom-color:var(--accent)}
.sec-h{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--ink-muted);margin:12px 0 6px;
  display:flex;align-items:center;gap:5px;
}
.sec-h::after{content:'';flex:1;height:1px;background:var(--paper-dark)}

/* Prep time */
.prep-row{
  display:flex;align-items:center;gap:8px;
  background:var(--paper-mid);border:1px solid var(--paper-dark);
  border-radius:6px;padding:8px 12px;margin-bottom:4px;
}
.prep-inp{
  width:54px;border:none;background:transparent;
  font-size:20px;font-weight:700;color:var(--accent);
  font-family:'Playfair Display',serif;outline:none;text-align:center;
}
.prep-lbl{font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.04em}

/* Equipment */
.row-add{display:flex;gap:5px;margin-bottom:6px}
.row-add input{flex:1;min-width:0;padding:5px 8px;border:1px solid var(--paper-dark);border-radius:4px;background:var(--paper-mid);font-size:12px;color:var(--ink);outline:none}
.row-add input:focus{border-color:var(--accent)}
.btn-xs{padding:5px 9px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:4px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-xs:hover{background:var(--accent);color:#fff}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.chip{display:flex;align-items:center;gap:3px;padding:2px 7px;background:var(--paper-mid);border:1px solid var(--paper-dark);border-radius:11px;font-size:11px;color:var(--ink)}
.chip-x{background:none;border:none;cursor:pointer;color:var(--ink-muted);font-size:9px;padding:0;line-height:1;transition:color .15s}
.chip-x:hover{color:var(--red)}

/* Ingredients */
.ing-form{display:grid;grid-template-columns:1fr 42px 54px auto;gap:3px;margin-bottom:6px}
.ing-form input,.ing-form select{padding:5px 5px;border:1px solid var(--paper-dark);border-radius:4px;background:var(--paper-mid);font-size:11px;color:var(--ink);outline:none;width:100%}
.ing-form input:focus,.ing-form select:focus{border-color:var(--accent)}
.ing-list{list-style:none}
.ing-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--paper-dark);font-size:12px}
.ing-em{font-size:13px;flex-shrink:0}
.ing-name{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ing-amt{color:var(--accent);font-weight:700;font-size:11px;white-space:nowrap;flex-shrink:0}
.del-btn{background:none;border:none;cursor:pointer;color:var(--paper-dark);font-size:10px;padding:0;flex-shrink:0;transition:color .15s}
.del-btn:hover{color:var(--red)}

/* ── RIGHT PAGE ── */
.recipe-header{
  padding:13px 22px 11px;border-bottom:double 3px var(--gold);flex-shrink:0;
  background:linear-gradient(180deg,var(--paper) 0%,var(--paper-mid) 100%);
  display:flex;align-items:center;gap:10px;
}
.recipe-header-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-num{font-size:11px;color:var(--ink-muted);white-space:nowrap;flex-shrink:0}

/* Right page 2-column */
.right-cols{
  flex:1;display:grid;grid-template-columns:1.4fr 1fr;
  overflow:hidden;min-height:0;
}
.r-col{
  height:100%;overflow-y:auto;padding:14px 18px;
  border-right:1px solid var(--paper-dark);
  scrollbar-width:thin;scrollbar-color:var(--paper-dark) transparent;
}
.r-col:last-child{border-right:none}
.col-h{
  font-family:'Playfair Display',serif;font-size:11px;color:var(--accent);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--gold);
}

/* ── STEPS ── */
.steps-ul{list-style:none;margin-bottom:9px}
.step-li{display:flex;gap:7px;padding:8px 4px;border-bottom:1px solid var(--paper-dark);align-items:flex-start;cursor:grab;transition:background .15s}
.step-li:hover{background:var(--paper-mid);border-radius:4px}
.step-li.done{opacity:.5}
.step-li.done .step-ta{text-decoration:line-through;color:var(--ink-muted)}
.step-li.drag-over{border-top:2px solid var(--accent)}
.step-n{width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0}
.step-body{flex:1;min-width:0}
.step-ta{width:100%;border:none;background:transparent;font-family:'Lato',sans-serif;font-size:12px;color:var(--ink);resize:none;outline:none;line-height:1.5;min-height:32px}
.step-t-row{display:flex;align-items:center;gap:3px;margin-top:2px}
.step-t-inp{width:36px;border:none;border-bottom:1px dashed var(--paper-dark);background:transparent;font-size:10px;color:var(--accent);outline:none;text-align:center}
.step-t-lbl{font-size:10px;color:var(--ink-muted)}
.step-acts{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.step-btn{width:19px;height:19px;border:none;border-radius:3px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.s-done{background:var(--paper-dark);color:var(--green)}
.s-done:hover,.step-li.done .s-done{background:var(--green);color:#fff}
.s-del{background:var(--paper-dark);color:var(--ink-muted)}
.s-del:hover{background:var(--red);color:#fff}
.btn-add-step{width:100%;padding:7px;border:1.5px dashed var(--paper-dark);border-radius:5px;background:transparent;color:var(--ink-muted);font-size:12px;cursor:pointer;transition:all .2s}
.btn-add-step:hover{border-color:var(--accent);color:var(--accent);background:var(--paper-mid)}

/* ── NUTRITION ── */
.port-row{display:flex;align-items:center;gap:7px;margin-bottom:10px;font-size:12px;color:var(--ink-muted)}
.port-inp{width:40px;text-align:center;padding:3px;border:1px solid var(--paper-dark);border-radius:4px;background:var(--paper-mid);font-size:13px;font-weight:700;color:var(--accent);outline:none}
.mode-row{display:flex;gap:4px;margin-bottom:10px}
.mode-btn{padding:3px 8px;border-radius:10px;border:1px solid var(--paper-dark);background:transparent;color:var(--ink-muted);cursor:pointer;font-size:10px;transition:all .15s}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.donut-wrap{position:relative;width:100px;height:100px;margin:0 auto 10px}
.donut-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-kcal{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink);line-height:1}
.donut-sub{font-size:8px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.04em}
.nutr-r{margin-bottom:7px}
.nutr-r-top{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.nutr-r-lbl{color:var(--ink-muted);display:flex;align-items:center;gap:3px}
.nutr-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nutr-val{font-weight:700}
.nutr-track{background:var(--paper-dark);border-radius:3px;height:4px}
.nutr-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── PAGE FOOTER ── */
.pg-footer{position:absolute;bottom:7px;font-family:'Playfair Display',serif;font-size:10px;color:var(--ink-muted);opacity:.4;pointer-events:none;z-index:2}
.pg-footer.l{left:16px}
.pg-footer.r{right:16px}

/* ── FLOATING TOOLBAR ── */
.toolbar{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:50}
.tb-btn{
  width:42px;height:42px;border-radius:50%;
  border:2px solid var(--gold);background:rgba(30,15,8,.88);color:var(--gold);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.5);transition:all .2s;position:relative;
}
.tb-btn:hover{background:var(--accent);border-color:var(--gold-light);transform:scale(1.08)}
.tb-btn[data-tip]::after{
  content:attr(data-tip);position:absolute;right:50px;
  background:rgba(30,15,8,.95);color:var(--gold);padding:4px 9px;border-radius:4px;
  font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;
  font-family:'Lato',sans-serif;border:1px solid rgba(201,168,76,.3);
}
.tb-btn:hover[data-tip]::after{opacity:1}

/* ── EMPTY STATE ── */
.empty-state{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  color:var(--ink-muted);text-align:center;padding:40px;gap:12px;
}
.empty-state .es-icon{font-size:48px;opacity:.4}
.empty-state .es-text{font-style:italic;font-size:14px;line-height:1.6}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:var(--gold);padding:9px 18px;border-radius:6px;font-size:13px;z-index:100;transition:transform .3s;border:1px solid rgba(201,168,76,.4);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── DIALOG ── */
.dlg-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.dlg-ov.open{display:flex}
.dlg{background:var(--paper);border-radius:8px;padding:26px;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.6);border:1px solid var(--gold)}
.dlg h3{font-family:'Playfair Display',serif;margin-bottom:8px;color:var(--ink);font-size:16px}
.dlg p{font-size:13px;color:var(--ink-muted);margin-bottom:18px;line-height:1.5}
.dlg-btns{display:flex;gap:8px;justify-content:flex-end}
.dlg-btn{padding:7px 16px;border-radius:5px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;border:1px solid}
.dlg-cancel{background:var(--paper-mid);border-color:var(--paper-dark);color:var(--ink-muted)}
.dlg-cancel:hover{background:var(--paper-dark)}
.dlg-ok{background:var(--red);border-color:var(--red);color:#fff}
.dlg-ok:hover{background:#a93226}

/* ── RESPONSIVE (mobiel) ── */
@media(max-width:767px){
  .book-spine{display:none}
  .page-left{display:none}
  .page-right{width:100%}
  .nav-arrow{top:auto;bottom:14px;transform:none}
  .right-cols{grid-template-columns:1fr}
  .r-col{border-right:none;border-bottom:1px solid var(--paper-dark)}
  .toolbar{bottom:70px}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--paper-dark);border-radius:2px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>

<div id="tocPanel">
  <div class="toc-p-title">📚 Inhoudsopgave<button class="toc-close" id="tocCloseBtn" title="Sluit inhoudsopgave">✕</button></div>
  <input class="toc-p-search" id="tocPanelSearch" placeholder="Zoek recept…">

function toGrams(amt,unit){
  const a=parseFloat(amt)||0;
  return a*({'g':1,'ml':1,'el':15,'tl':5,'stuks':80,'snufje':1}[unit]||1);
}
function calcNutr(ings){
  const t={kcal:0,carbs:0,pro:0,fat:0,sug:0,fib:0};
  for(const i of ings){
    const l=i.name.toLowerCase().trim();
    let d=null;
    for(const[k,v] of Object.entries(NDB)) if(l.includes(k)||k.includes(l)){d=v;break}
    if(!d) continue;
    const g=toGrams(i.amount,i.unit)/100;
    t.kcal+=d.kcal*g;t.carbs+=d.carbs*g;t.pro+=d.pro*g;t.fat+=d.fat*g;t.sug+=d.sug*g;t.fib+=d.fib*g;
  }
  return t;
}

// Spreads: 0=cover, 1..N=recipe spreads
function totalSpreads(){return 1+recipes.length}

// ── FIREBASE ──────────────────────────────────────────────────
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const data={};
    recipes.forEach((r,i)=>data[r.id]={...r,_ord:i});
    set(dbRef,data).catch(()=>{});
    localStorage.setItem('kb_data',JSON.stringify(recipes));
  },500);
}

// Boot: local first, firebase sync once
(()=>{
  try{const s=localStorage.getItem('kb_data');if(s) recipes=JSON.parse(s);}catch{}
  render();
  onValue(dbRef,snap=>{
    const val=snap.val();
    if(val){
      recipes=Object.values(val).sort((a,b)=>(a._ord??0)-(b._ord??0));
      recipes.forEach(r=>{delete r._ord});
      localStorage.setItem('kb_data',JSON.stringify(recipes));
      render();
    }
  },{onlyOnce:true});
})();

// ── NAVIGATION ────────────────────────────────────────────────
function flip(dir,target){
  if(busy) return;
  if(target===undefined) target=spreadIdx+dir;
  if(target<0||target>=totalSpreads()) return;
  busy=true;
  const right=document.getElementById('pageRight');
  const ov=document.getElementById('flipOverlay');
  const snap=right.innerHTML;
  spreadIdx=target;
  render();
  ov.innerHTML=`<div class="flipper ${dir>0?'go-forward':'go-back'}" id="flipper">
    <div class="flip-front">${snap}</div>
    <div class="flip-back" style="background:var(--paper-dark)"></div>
  </div>`;
  document.getElementById('flipper').addEventListener('animationend',()=>{ov.innerHTML='';busy=false;},{once:true});
}
function goTo(s){if(s!==spreadIdx) flip(s>spreadIdx?1:-1,s)}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const pL=document.getElementById('pageLeft');
  const pR=document.getElementById('pageRight');
  document.getElementById('prevBtn').disabled=(spreadIdx<=0);
  document.getElementById('nextBtn').disabled=(spreadIdx>=totalSpreads()-1);
  document.getElementById('btnDel').style.display=spreadIdx>=1?'flex':'none';

  if(spreadIdx===0){
    // Cover spread
    pL.innerHTML=`<div class="cover-back"><div class="cover-back-decor"></div></div>`;
    pR.innerHTML=coverHTML();
    updateTOCPanel(null);
    bindCover();
  } else {
    const ri=recipeIndexForSpread(spreadIdx);
    const r=recipes[ri];
    if(!r){pL.innerHTML='';pR.innerHTML='';return;}
    pL.innerHTML=leftPageHTML(r, spreadIdx*2);
    pR.innerHTML=rightPageHTML(r, spreadIdx*2+1);
    updateTOCPanel(r.id);
    bindPage(r);
  }
}

function bindCover(){
  document.getElementById('coverOwner')?.addEventListener('click',()=>{

      document.getElementById('coverOwner').textContent=ownerName;

// ── TOC PANEL (buiten het boek) ───────────────────────────────
function updateTOCPanel(activeId){
  const list=document.getElementById('tocPanelList');
  if(!list) return;
  if(!recipes.length){list.innerHTML='<div class="toc-p-empty">Nog geen recepten.</div>';return;}
  list.innerHTML=recipes.map((r,i)=>`
    <div class="toc-p-entry${r.id===activeId?' active':''}" data-s="${i+1}">
      <span class="toc-p-num">${i+1}</span>
      <span class="toc-p-name">${x(r.title)}</span>
    </div>`).join('');
  list.querySelectorAll('.toc-p-entry[data-s]').forEach(el=>{
    el.addEventListener('click',()=>goTo(parseInt(el.dataset.s)));
  });
  // search
  const search=document.getElementById('tocPanelSearch');
  if(search){
    search.oninput=null;
    search.addEventListener('input',e=>{
      const q=e.target.value.toLowerCase();
      list.querySelectorAll('.toc-p-entry').forEach(el=>{
        el.style.display=el.querySelector('.toc-p-name').textContent.toLowerCase().includes(q)?'':'none';
      });
    });
  }
}

function nutrRows(n,por,pp){
  const d=pp?por:1;
  return[
    {lbl:'Koolhydraten',k:'carbs',clr:'#4A90D9',adh:ADH.carbs},
    {lbl:'Eiwitten',    k:'pro',  clr:'#E74C3C',adh:ADH.pro  },
    {lbl:'Vetten',      k:'fat',  clr:'#F1C40F',adh:ADH.fat  },
    {lbl:'Suikers',     k:'sug',  clr:'#E67E22',adh:ADH.sug  },
    {lbl:'Vezels',      k:'fib',  clr:'#2ECC71',adh:ADH.fib  },
  ].map(row=>{
    const v=(n[row.k]||0)/d,pct=Math.min((v/row.adh)*100,100);
    const fc=pct<15?'#4A7C59':pct<30?'#D35400':'#C0392B';
    const vc=pct<15?'var(--green)':pct<30?'var(--orange)':'var(--red)';
    return`<div class="nutr-r">
      <div class="nutr-r-top">
        <span class="nutr-r-lbl"><span class="nutr-dot" style="background:${row.clr}"></span>${row.lbl}</span>
        <span class="nutr-val" style="color:${vc}">${v.toFixed(1)}g</span>
      </div>
      <div class="nutr-track"><div class="nutr-fill" style="width:${pct.toFixed(0)}%;background:${fc}"></div></div>
    </div>`;
  }).join('');
}

function drawDonut(id,n,por){
  const c=document.getElementById(`dc-${id}`);if(!c) return;
  const ctx=c.getContext('2d'),cx=50,cy=50,r=42,lw=11;
  const tot=(n.carbs+n.pro+n.fat)/por;
  ctx.clearRect(0,0,100,100);
  if(tot<=0){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#E8E0D0';ctx.lineWidth=lw;ctx.stroke();return;}
  let a=-Math.PI/2;
  for(const[val,clr] of [[n.carbs/por,'#4A90D9'],[n.pro/por,'#E74C3C'],[n.fat/por,'#F1C40F']]){
    const sw=(val/tot)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,a,a+sw);ctx.strokeStyle=clr;ctx.lineWidth=lw;ctx.stroke();a+=sw;
  }
}

// ── BIND PAGE ─────────────────────────────────────────────────
// Bindt enkel de linker pagina (receptinfo). Veilig om meerdere keren aan te roepen.
function bindLeftPage(r){
  const rid=r.id;

  document.querySelector(`.recipe-title-inp[data-rid="${rid}"]`)?.addEventListener('change',e=>{
    getR(rid).title=e.target.value.trim()||'Naamloos';save();
    const hdr=document.querySelector('.recipe-header-title');
    if(hdr) hdr.textContent=getR(rid).title;
    updateTOCPanel(rid);
  });

  document.querySelector(`.persons-inp[data-rid="${rid}"]`)?.addEventListener('change',e=>{
    const r2=getR(rid);r2.portions=parseInt(e.target.value)||1;save();
    refreshNutrition(r2);
    const portInp=document.querySelector(`.port-inp[data-rid="${rid}"]`);
    if(portInp) portInp.value=r2.portions;
  });

  document.querySelector(`.prep-inp[data-rid="${rid}"]`)?.addEventListener('change',e=>{
    getR(rid).prepTime=parseInt(e.target.value)||null;save();
  });

  const eqBtn=document.querySelector(`.eq-add[data-rid="${rid}"]`);
  const eqIn=document.getElementById(`eq-${rid}`);
  if(eqBtn&&eqIn){
    const doEq=()=>{
      const v=eqIn.value.trim();if(!v) return;
      const r2=getR(rid);if(!r2.equipment.includes(v)) r2.equipment.push(v);
      eqIn.value='';save();refreshLeft(r2);
    };
    eqBtn.addEventListener('click',doEq);
    eqIn.addEventListener('keydown',e=>{if(e.key==='Enter')doEq()});
  }

  document.querySelectorAll(`.chip-x[data-rid="${rid}"]`).forEach(b=>{
    b.addEventListener('click',()=>{
      const r2=getR(rid);r2.equipment=r2.equipment.filter(e=>e!==b.dataset.eq);
      save();refreshLeft(r2);
    });
  });

  const iBtn=document.querySelector(`.ing-add[data-rid="${rid}"]`);
  if(iBtn){
    const doIng=()=>{
      const nEl=document.getElementById(`in-${rid}`),aEl=document.getElementById(`ia-${rid}`),uEl=document.getElementById(`iu-${rid}`);
      const name=nEl.value.trim();if(!name){nEl.focus();return;}
      getR(rid).ingredients.push({id:Date.now(),name,amount:parseFloat(aEl.value)||0,unit:uEl.value,emoji:ingEmoji(name)});
      nEl.value='';aEl.value='';uEl.value='g';save();
      const r2=getR(rid);refreshLeft(r2);refreshNutrition(r2);
    };
    iBtn.addEventListener('click',doIng);
    document.getElementById(`in-${rid}`)?.addEventListener('keydown',e=>{if(e.key==='Enter')doIng()});
  }

  document.querySelectorAll(`.del-btn[data-rid="${rid}"]`).forEach(b=>{
    b.addEventListener('click',()=>{
      const r2=getR(rid);r2.ingredients=r2.ingredients.filter(i=>i.id!=b.dataset.iid);
      save();refreshLeft(r2);refreshNutrition(r2);
    });
  });
}

// Bindt enkel de rechter pagina (stappen + voeding). Wordt maar 1x aangeroepen per render.
function bindRightPage(r){
  const rid=r.id;

  requestAnimationFrame(()=>drawDonut(rid,calcNutr(r.ingredients||[]),r.portions||1));

  bindSteps(r);

  document.querySelector(`.port-inp[data-rid="${rid}"]`)?.addEventListener('change',e=>{
    const r2=getR(rid);r2.portions=parseInt(e.target.value)||1;save();refreshNutrition(r2);
    const persInp=document.querySelector(`.persons-inp[data-rid="${rid}"]`);
    if(persInp) persInp.value=r2.portions;
  });

  document.querySelectorAll(`.mode-btn[data-rid="${rid}"]`).forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll(`.mode-btn[data-rid="${rid}"]`).forEach(x2=>x2.classList.remove('active'));
      b.classList.add('active');
      const r2=getR(rid),pp=b.dataset.mode==='pp',nr=calcNutr(r2.ingredients||[]);
      document.getElementById(`nt-${rid}`).innerHTML=nutrRows(nr,r2.portions||1,pp);
      const kEl=document.getElementById(`dkc-${rid}`);
      if(kEl) kEl.textContent=Math.round(pp?nr.kcal/(r2.portions||1):nr.kcal);
    });
  });
}

function bindPage(r){
  bindLeftPage(r);
  bindRightPage(r);
}

function bindSteps(r){
  const rid=r.id;
  document.querySelector(`.btn-add-step[data-rid="${rid}"]`)?.addEventListener('click',()=>{
    getR(rid).steps.push({id:Date.now(),text:'',time:null,done:false});
    save();refreshSteps(getR(rid));
  });
  document.querySelectorAll(`.s-done[data-rid="${rid}"]`).forEach(b=>{
    b.addEventListener('click',()=>{
      const s=getR(rid).steps.find(s=>s.id==b.dataset.sid);
      if(s){s.done=!s.done;save();refreshSteps(getR(rid));}
    });
  });
  document.querySelectorAll(`.s-del[data-rid="${rid}"]`).forEach(b=>{
    b.addEventListener('click',()=>{
      const r2=getR(rid);r2.steps=r2.steps.filter(s=>s.id!=b.dataset.sid);
      save();refreshSteps(r2);
    });
  });
  document.querySelectorAll(`.step-ta[data-rid="${rid}"]`).forEach(ta=>{
    ta.addEventListener('input',()=>{
      const s=getR(rid).steps.find(s=>s.id==ta.dataset.sid);
      if(s){s.text=ta.value;save();}
      ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    });
  });
  document.querySelectorAll(`.step-t-inp[data-rid="${rid}"]`).forEach(inp=>{
    inp.addEventListener('change',()=>{
      const s=getR(rid).steps.find(s=>s.id==inp.dataset.sid);
      if(s){s.time=parseInt(inp.value)||null;save();}
    });
  });
  // Drag & drop
  let src=null;
  document.querySelectorAll(`.step-li[data-rid="${rid}"]`).forEach(li=>{
    li.addEventListener('dragstart',e=>{src=li;e.dataTransfer.effectAllowed='move';setTimeout(()=>li.style.opacity='.35',0)});
    li.addEventListener('dragend',()=>{li.style.opacity=''});
    li.addEventListener('dragover',e=>{e.preventDefault();li.classList.add('drag-over')});
    li.addEventListener('dragleave',()=>li.classList.remove('drag-over'));
    li.addEventListener('drop',e=>{
      e.preventDefault();li.classList.remove('drag-over');
      if(src===li) return;
      const r2=getR(rid);
      const si=r2.steps.findIndex(s=>s.id==src.dataset.sid);
      const di=r2.steps.findIndex(s=>s.id==li.dataset.sid);
      if(si<0||di<0) return;
      const[m]=r2.steps.splice(si,1);r2.steps.splice(di,0,m);
      save();refreshSteps(r2);
    });
  });
}

// Partial refreshes
function refreshLeft(r){
  const info=document.getElementById(`rinfo-${r.id}`);
  if(info){
    const tmp=document.createElement('div');
    tmp.innerHTML=leftPageHTML(r,spreadIdx*2);
    info.outerHTML=tmp.querySelector(`#rinfo-${r.id}`).outerHTML;
    updateTOCPanel(r.id);
    bindLeftPage(r);  // alleen linker pagina, nooit de stappen-kolom
  }
}
function refreshNutrition(r){
  const c2=document.getElementById(`rc2-${r.id}`);
  const c3=document.getElementById(`rc3-${r.id}`);
  if(c3){
    const n=calcNutr(r.ingredients||[]);
    const por=r.portions||1;
    document.getElementById(`nt-${r.id}`).innerHTML=nutrRows(n,por,true);
    document.getElementById(`dkc-${r.id}`).textContent=Math.round(n.kcal/por);
    drawDonut(r.id,n,por);
    // reset mode buttons
    document.querySelectorAll(`.mode-btn[data-rid="${r.id}"]`).forEach((b,i)=>b.classList.toggle('active',i===0));
  }
}
function refreshSteps(r){
  const el=document.getElementById(`rc2-${r.id}`);
  if(el){
    const tmp=document.createElement('div');
    tmp.innerHTML=rightPageHTML(r,spreadIdx*2+1);
    const newCol=tmp.querySelector(`#rc2-${r.id}`);
    if(newCol) el.outerHTML=newCol.outerHTML;
    bindSteps(r);
  }
}

// ── TOOLBAR ───────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click',()=>flip(-1));
document.getElementById('nextBtn').addEventListener('click',()=>flip(1));

document.getElementById('btnNew').addEventListener('click',()=>{
  const r=newRecipe();recipes.push(r);save();goTo(recipes.length);// spread = index+1
});

document.getElementById('btnDel').addEventListener('click',()=>{
  const ri=recipeIndexForSpread(spreadIdx);if(ri<0||ri>=recipes.length) return;
  const r=recipes[ri];
  dlg('Recept verwijderen',`Weet je zeker dat je "${r.title}" wilt verwijderen?`,()=>{
    remove(ref(db,`recepten/${r.id}`));
    recipes.splice(ri,1);
    localStorage.setItem('kb_data',JSON.stringify(recipes));
    spreadIdx=Math.max(0,Math.min(spreadIdx,totalSpreads()-1));
    render();toast('Recept verwijderd');
  });
});

document.getElementById('btnExp').addEventListener('click',()=>{
  const b=new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mijn-kookboek.json';a.click();
  toast('Kookboek geëxporteerd');
});
document.getElementById('btnImp').addEventListener('click',()=>document.getElementById('fileIn').click());
document.getElementById('fileIn').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f) return;
  const fr=new FileReader();
  fr.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(Array.isArray(imp)){recipes=imp;save();spreadIdx=0;render();toast(`${imp.length} recept(en) geïmporteerd`);}
    }catch{toast('Importfout');}
  };
  fr.readAsText(f);e.target.value='';
});

// ── SWIPE ─────────────────────────────────────────────────────
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50) flip(dx<0?1:-1);},{passive:true});

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if(e.key==='ArrowRight') flip(1);
  if(e.key==='ArrowLeft')  flip(-1);
});

// ── DIALOG ────────────────────────────────────────────────────
function dlg(title,msg,cb){
  document.getElementById('dlgTitle').textContent=title;
  document.getElementById('dlgMsg').textContent=msg;
  _dlgCb=cb;document.getElementById('dlgOv').classList.add('open');
}
document.getElementById('dlgNo').addEventListener('click',()=>document.getElementById('dlgOv').classList.remove('open'));
document.getElementById('dlgYes').addEventListener('click',()=>{document.getElementById('dlgOv').classList.remove('open');if(_dlgCb)_dlgCb();});

// ── TOAST ─────────────────────────────────────────────────────
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500);}

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
